<!DOCTYPE html>
<html>
<head><style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 280px; padding: 12px 12px 8px; font-family: system-ui; font-size: 13px; color: #e0e0e0; background: #1e1e2e; border-radius: 12px; }
#list { display: flex; flex-direction: column; gap: 4px; }
.entry { border-radius: 8px; background: #2a2a3e; overflow: hidden; }
.entry-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer; }
.entry-row .name { flex: 1; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn { border: none; border-radius: 4px; cursor: pointer; padding: 4px 8px; font-size: 12px; background: #3a3a50; color: #ccc; }
.btn:hover { background: #4a4a60; }
.btn-toggle { width: 36px; text-align: center; }
.btn-on { background: #34c759; color: #fff; }
.btn-on:hover { background: #2db84e; }
.btn-fail { background: #ff3b30; color: #fff; }
.btn-fail:hover { background: #e0332b; }
.entry-edit { display: none; flex-direction: column; gap: 6px; padding: 4px 8px 8px; }
.entry-edit.open { display: flex; }
.entry-edit input { padding: 5px 7px; border: 1px solid #3a3a50; border-radius: 4px; font-size: 12px; width: 100%; background: #1e1e2e; color: #e0e0e0; }
.entry-edit input:focus { outline: none; border-color: #4a9eff; }
.entry-edit input::placeholder { color: #666; }
.filter-row { display: flex; gap: 6px; }
.filter-row .btn { flex: 1; }
.btn-active { font-size: 11px; background: #007aff; color: #fff; }
.btn-active:hover { background: #0066d6; }
.btn-inactive { font-size: 11px; text-decoration: line-through; }
.auto-domains { font-size: 11px; color: #888; word-break: break-all; line-height: 1.4; padding: 4px 0; }
.btn-clear { background: #ff9500; color: #fff; font-size: 11px; width: 100%; padding: 6px; }
.btn-clear:hover { background: #e08600; }
.btn-delete { background: #ff3b30; color: #fff; font-size: 11px; width: 100%; padding: 6px; }
.btn-delete:hover { background: #e0332b; }
#footer { display: flex; align-items: center; margin-top: 8px; }
#footer .credit { flex: 1; font-size: 10px; color: #555; }
.btn-add { width: 32px; height: 32px; border: none; border-radius: 50%; background: #007aff; color: #fff; cursor: pointer; font-size: 20px; line-height: 32px; text-align: center; padding: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.2); flex-shrink: 0; }
.btn-add:hover { background: #0066d6; }
</style></head>
<body>
  <div id="list"></div>
  <div id="footer">
    <span class="credit">Made with &#10084; by Matthieu Hourdebaigt</span>
    <button id="add" class="btn-add">+</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
